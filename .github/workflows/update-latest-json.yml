name: Update latest.json

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-latest-json:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate latest.json from project version
        run: |
          python3 - <<'PY'
          from datetime import datetime, timezone
          import json
          import pathlib
          import tomllib

          root = pathlib.Path(".")
          pyproject = root / "pyproject.toml"
          latest_json = root / "latest.json"

          with pyproject.open("rb") as f:
            data = tomllib.load(f)

          version = str(data.get("project", {}).get("version", "")).strip()
          if not version:
            raise SystemExit("Missing project.version in pyproject.toml")

          prev = {}
          if latest_json.exists():
            try:
              prev = json.loads(latest_json.read_text(encoding="utf-8"))
            except Exception:
              prev = {}

          same_release_payload = (
            str(prev.get("version", "")).strip() == version
            and str(prev.get("release_notes", "")).strip() == ""
            and str(prev.get("download_url", "")).strip() == "https://www.informity.ai/download/Informity_AI_latest_aarch64.dmg"
          )
          published_at = str(prev.get("published_at", "")).strip() if same_release_payload else ""
          if not published_at:
            published_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          payload = {
            "version": version,
            "release_notes": "",
            "download_url": "https://www.informity.ai/download/Informity_AI_latest_aarch64.dmg",
            "published_at": published_at,
          }

          latest_json.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- latest.json; then
            echo "latest.json unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add latest.json
          git commit -m "chore: update latest.json [skip ci]"
          git push origin HEAD:develop
